apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: argocd-server # Ensure this SA has permission to read Secrets Manager or use IRSA via eksctl/terraform
            namespace: argocd
