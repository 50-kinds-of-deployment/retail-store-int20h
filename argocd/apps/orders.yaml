apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  destination:
    namespace: 'orders'
    server: https://kubernetes.default.svc
  source:
    path: src/orders/chart
    repoURL: https://github.com/50-Kinds-of-deployment/retail-store-int20h.git
    targetRevision: fix-stage
    helm:
      valueFiles:
        - /values/orders.yaml
  sources: []
  project: default
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
