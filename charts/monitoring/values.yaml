victoria-metrics-k8s-stack:
  enabled: true
  fullnameOverride: "vm"
  victoria-metrics-operator:
    crds:
      plain: true
  alertmanager:
    enabled: false
  vmalert:
    enabled: false
  grafana:
    plugins:
    - victoriametrics-logs-datasource
    service:
      type: ClusterIP
  defaultDatasources:
    extra:
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        url: http://victoria-logs:9428
        access: proxy
        version: 1

  defaultDashboards:
    dashboards:
      alertmanager-overview:
        enabled: false
      etcd:
        enabled: false
      grafana-overview:
        enabled: false
      kubernetes-controller-manager:
        enabled: false
      kubernetes-kubelet:
        enabled: true
      kubernetes-proxy:
        enabled: false
      kubernetes-scheduler:
        enabled: true
      kubernetes-system-api-server:
        enabled: true
      kubernetes-system-coredns:
        enabled: false
      kubernetes-views-global:
        enabled: true
      kubernetes-views-namespaces:
        enabled: true
      kubernetes-views-nodes:
        enabled: true
      kubernetes-views-pods:
        enabled: true
      node-exporter-full:
        enabled: true
      victoriametrics-backupmanager:
        enabled: false
      victoriametrics-cluster:
        enabled: false
      victoriametrics-operator:
        enabled: false
      victoriametrics-single-node:
        enabled: false
      victoriametrics-vmagent:
        enabled: false
      victoriametrics-vmalert:
        enabled: false
  defaultRules:
    create: false

  vmsingle:
    spec:
      resources:
        limits:
          memory: 3Gi
        requests:
          cpu: 100m
          memory: 128Mi


victoria-logs-single:
  enabled: true
  server:
    fullnameOverride: "victoria-logs"
    retentionPeriod: 7d
    persistentVolume:
      size: 10Gi

victoria-logs-collector:
  enabled: true
  remoteWrite:
    - url: http://victoria-logs:9428
  persistence:
    volume:
      emptyDir: {}
  defaultVolumes:
    - name: varlog
      hostPath:
        path: /var/log
  defaultVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true


externalDashboards:
  enabled: true
  dashboards:
    logs:
      enabled: true
    hpa:
      enabled: true
