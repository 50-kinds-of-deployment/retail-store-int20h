image:
  repository: "public.ecr.aws/aws-containers/retail-store-sample-checkout"
  tag: "1.4.0"

opentelemetry:
  enabled: true
  instrumentation: "opentelemetry-operator-system/default-instrumentation"

app:
  persistence:
    provider: 'redis'
    secret:
      name: 'checkout-redis'
    redis:
      endpoint: ''

  endpoints:
    orders: 'http://orders.orders.svc:80'
