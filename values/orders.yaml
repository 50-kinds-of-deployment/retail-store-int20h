image:
  repository: "public.ecr.aws/aws-containers/retail-store-sample-orders"
  tag: "1.4.0"

opentelemetry:
  enabled: true
  instrumentation: "opentelemetry-operator-system/default-instrumentation"

app:
  persistence:
    provider: 'postgres'
    database: 'orders'

    secret:
      create: false
      name: "orders-db"

  messaging:
    provider: 'rabbitmq'

    rabbitmq:
      addresses: ["amqps://b-3d28052e-fe42-4c1d-8cbd-6b882567b389.mq.eu-central-1.on.aws:5671"]

      secret:
        create: false
        name: "orders-rabbitmq"
