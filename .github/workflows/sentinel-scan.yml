name: Sentinel Policy Scan

on:
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

env:
  TERRAFORM_VERSION: 1.9.0
  SENTINEL_VERSION: 0.26.0

jobs:
  sentinel-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download Sentinel CLI
        run: |
          mkdir -p /tmp/sentinel
          cd /tmp/sentinel
          wget https://releases.hashicorp.com/sentinel/${{ env.SENTINEL_VERSION }}/sentinel_${{ env.SENTINEL_VERSION }}_linux_amd64.zip
          unzip sentinel_${{ env.SENTINEL_VERSION }}_linux_amd64.zip
          sudo mv sentinel /usr/local/bin/

      - name: Verify Sentinel Installation
        run: sentinel version

      - name: Terraform Init for Policy Scanning
        run: |
          cd terraform/eks/default
          terraform init -input=false
        env:
          TF_IN_AUTOMATION: true

      - name: Generate Terraform Plan JSON
        run: |
          cd terraform/eks/default
          terraform plan -out=tfplan -input=false -lock=false
          terraform show -json tfplan > plan.json
        env:
          TF_IN_AUTOMATION: true

      - name: Run Sentinel Policy Scan
        id: sentinel
        run: |
          cd terraform/eks/default
          sentinel apply -json policy.hcl plan.json > sentinel-result.json 2>&1 || true
          cat sentinel-result.json

      - name: Parse Sentinel Results
        id: parse
        run: |
          if [ -f terraform/eks/default/sentinel-result.json ]; then
            echo "Sentinel scan completed"
            cat terraform/eks/default/sentinel-result.json
          fi

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'terraform/eks/default/sentinel-result.json';
            
            let comment = '## 🛡️ Sentinel Policy Scan Results\n\n';
            
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              comment += '```json\n' + JSON.stringify(results, null, 2) + '\n```';
            } else {
              comment += 'No policy violations detected ✅';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Sentinel Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-scan-results-${{ github.run_id }}
          path: terraform/eks/default/sentinel-result.json
          retention-days: 30

      - name: Fail if Policy Violations Found
        run: |
          if grep -q '"result": false' terraform/eks/default/sentinel-result.json; then
            echo "Policy violations detected!"
            exit 1
          fi
        continue-on-error: true
