name: Semgrep

on:
  pull_request: {}

jobs:
  semgrep_scan:
    name: semgrep/ci
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Perform Semgrep Analysis
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: semgrep ci -q --sarif > semgrep-results.sarif

      - name: Generate HTML report
        run: |
          python3 scripts/sarif_to_html.py semgrep-results.sarif semgrep-report.html

      - name: Save HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-html-report
          path: semgrep-report.html

      # only public repo
      # - name: Upload SARIF result to the GitHub Security Dashboard
