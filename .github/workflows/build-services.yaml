name: Build services
on:
  push:
    branches:
      - "ci/buildah" #TODO change later to main

jobs:
  changes:
    uses: ./.github/workflows/changes.yaml

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - name: Build and Push Image
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          CACHE_REPO: ghcr.io/${{ github.repository }}/${{ matrix.service }}/cache
        run: |
          buildah build \
            -f src/${{ matrix.service }}/Dockerfile \
            --layers \
            --cache-from $CACHE_REPO \
            --cache-to $CACHE_REPO \
            -t $IMAGE \
            src/${{ matrix.service }}

      - name: Push Image
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
        run: buildah push $IMAGE