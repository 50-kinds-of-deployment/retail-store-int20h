name: Load Generator Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to load test'
        required: true
        type: string
        default: 'http://localhost:8888'
      duration:
        description: 'Test duration in seconds'
        required: true
        type: string
        default: '60'
      virtual_users:
        description: 'Number of virtual users'
        required: true
        type: string
        default: '1'

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run load generator
        working-directory: src/load-generator
        run: |
          bash scripts/run-docker.sh \
            --target "${{ inputs.target_url }}" \
            --duration "${{ inputs.duration }}" \
            --vu "${{ inputs.virtual_users }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: src/load-generator/output.json
          retention-days: 30
