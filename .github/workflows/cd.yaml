name: CD - Layer Deployment Workflow

on:
  workflow_call:
    inputs:
      layer:
        description: 'Layer name to deploy (bootstrap, ops, app)'
        required: true
        type: string
      skip-sentinel:
        description: 'Skip Sentinel policy checks'
        required: false
        type: boolean
        default: false


jobs:
  plan:
    name: Terraform Plan
    uses: ./.github/workflows/terraform-plan.yaml
    secrets: inherit
    with:
      layer: ${{ inputs.layer }}

  sentinel:
    name: Sentinel Policy Check
    if: ${{ !inputs.skip-sentinel }}
    needs: [plan]
    uses: ./.github/workflows/terraform-sentinel.yaml
    secrets: inherit
    with:
      layer: ${{ inputs.layer }}

  apply:
    name: Terraform Apply
    # Only run apply if plan detected changes (exit code 2)
    if: ${{ needs.plan.outputs.plan_exitcode == '2' }}
    needs: ${{ inputs.skip-sentinel && fromJson('["plan"]') || fromJson('["plan", "sentinel"]') }}
    uses: ./.github/workflows/terraform-apply.yaml
    secrets: inherit
    with:
      layer: ${{ inputs.layer }}
