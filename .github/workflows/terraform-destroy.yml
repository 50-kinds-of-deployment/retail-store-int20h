name: Terraform Destroy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to destroy (dev, staging, prod)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: 1.9.0
  AWS_DEFAULT_REGION: us-west-2
  TERRAFORM_DIR: terraform/eks/default
  TF_IN_AUTOMATION: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init -upgrade

      - name: Terraform Destroy
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform destroy -auto-approve -input=false \
            -var="environment_name=${{ inputs.environment }}-retail-store"

      - name: Destruction Confirmation
        if: success()
        run: |
          echo "## EKS Cluster Destroyed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
